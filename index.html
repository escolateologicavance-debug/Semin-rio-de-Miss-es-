<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missões - Seminário</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; width: 80%; }
        img { width: 150px; margin-bottom: 20px; border-radius: 20px; }
        input { padding: 12px; border-radius: 8px; border: none; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        button { padding: 12px 25px; background: #e67e22; border: none; color: white; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo-512.png" alt="Logo Missões">
        <h2>Seminário de Missões</h2>
        <div id="login-box">
            <input type="password" id="senha" placeholder="Digite a senha de acesso">
            <button onclick="verificar()">Entrar</button>
        </div>
        <p id="erro" style="color: #ff4d4d; font-size: 14px; margin-top: 10px;"></p>
    </div>

    <script>
        // Registro do Service Worker para o PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function verificar() {
            const senhaDefinida = "mtmissoes"; // A senha que você solicitou
            const inputSenha = document.getElementById('senha').value;
            
            if (inputSenha === senhaDefinida) {
                window.location.href = "1.html"; // Redireciona para a primeira página
            } else {
                document.getElementById('erro').innerText = "Senha incorreta. Peça ao moderador.";
            }
        }
    </script>
</body>
</html>
